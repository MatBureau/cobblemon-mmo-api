ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.cobblemon.mmo.api.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/cobblemon"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "password"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 20
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

game {
    resin {
        maxResin = 160
        dailyRegen = 40
        regenIntervalMinutes = 8
        dungeonCost = 20
    }
    pvp {
        defaultElo = 1000
        kFactor = 32
        seasonDurationDays = 30
    }
    banner {
        rotationDays = 14
        pityThreshold = 90
        legendaryDropRate = 0.006
    }
    breeding {
        parentConsumed = true
        itemConsumed = true
    }
    battlePass {
        maxTier = 50
        xpPerTier = 1000
    }
}

auth {
    serverSecret = "CHANGEME-shared-secret"
    serverSecret = ${?MC_SERVER_SECRET}
    adminToken = "CHANGEME-admin-token"
    adminToken = ${?ADMIN_TOKEN}
}
